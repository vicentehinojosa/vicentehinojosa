<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 40" width="800" height="40">
  <rect width="800" height="40" fill="#0a0a0f"/>

  <!-- Scanner track (subtle dark bar) -->
  <rect x="60" y="16" width="680" height="8" rx="4" fill="#1a0000"/>

  <!-- Glow sweep -->
  <rect x="60" y="14" width="120" height="12" rx="6" fill="url(#scanGlow)" opacity="0.9">
    <animate attributeName="x" values="60;620;60" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
  </rect>

  <!-- Core bright dot -->
  <rect x="110" y="17" width="20" height="6" rx="3" fill="white" opacity="0.95">
    <animate attributeName="x" values="110;670;110" dur="2s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
  </rect>

  <defs>
    <linearGradient id="scanGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff0000" stop-opacity="0"/>
      <stop offset="40%" stop-color="#ff2200" stop-opacity="0.6"/>
      <stop offset="50%" stop-color="#ff4400" stop-opacity="1"/>
      <stop offset="60%" stop-color="#ff2200" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#ff0000" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
